version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: srtapp-db
    restart: always
    environment:
      POSTGRES_DB: srtapp_db
      POSTGRES_USER: srtapp_user
      POSTGRES_PASSWORD: srtapp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - srtapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srtapp_user -d srtapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: srtapp-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - srtapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: srtapp-search
    restart: always
    environment:
      MEILI_MASTER_KEY: srtapp-master-key
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - srtapp-network

  minio:
    image: minio/minio:latest
    container_name: srtapp-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - srtapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: srtapp-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - MEILISEARCH_HOST=meilisearch
      - MINIO_HOST=minio
      - MINIO_PORT=9000
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - srtapp-network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn srtapp.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: srtapp-celery
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - srtapp-network
    command: celery -A srtapp worker -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: srtapp-frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    networks:
      - srtapp-network
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: srtapp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      - backend
      - frontend
    networks:
      - srtapp-network

volumes:
  postgres_data:
  meilisearch_data:
  minio_data:
  static_volume:
  media_volume:

networks:
  srtapp-network:
    driver: bridge
